model:
  network:
    name: DeepPro
    num_classes: 1
    seqlen: 5
    out_len: 1
    
  optimizer:
    type: AdamW  # AdamW Adam
    init_lr: !!float 1.508e-3  # initial learning rate  1e-3  5e-4
    betas: [ 0.9, 0.999 ]
    weight_decay: !!float 1e-5
#  optimizer:
#    type: Adam
#    init_lr: !!float 5e-4  # initial learning rate  1e-3
#    betas: [ 0.9, 0.999 ]
  # lr_scheduler:
  #   warmup_iters: 1500  # number of warmup iters (-1 for no warmup)
  #   scheduler:
  #     type: MultiStepLR  # [LambdaLR, StepLR, MultiStepLR, CosineAnnealingLR]
  #     step_interval: epoch  # iter or epoch (every iter or every epoch to update once)
  #     milestones: [ 32, 44 ]  # [ 24, 33 ]  [ 32, 44 ]
  #     gamma: 0.1
  lr_scheduler:
    warmup_iters: 1500  # number of warmup iters (-1 for no warmup)
    # scheduler:
    #   type: CosineAnnealingLR  # [LambdaLR, StepLR, MultiStepLR, CosineAnnealingLR]
    #   step_interval: epoch  # iter or epoch (every iter or every epoch to update once)
    #   eta_min: !!float 1e-4
    scheduler:
     type: StepLR  # [LambdaLR, StepLR, MultiStepLR, CosineAnnealingLR]
     step_interval: epoch  # iter or epoch (every iter or every epoch to update once)
     step_size: 10  # 5, 10
     gamma: 0.7
  loss:
    num_preds: 1  # number of predicted masks (default 1, when using deep supervision > 1)
    loss_1:
      type: SoftIoULoss
      weight: 1
      smooth: 1
      reduction: mean

dataset:
  name: MIST  # [MIST, NUDT-MIRSDT]
  root: /home/ubuntu/data/zhengqinxu/object_detection/DATA/MIST_0912/MIST_0912  # data root path
  num_inputs: 5  # number of input frames
  img_size: [ 384, 384 ]  # image size
  frame_padding: False
  data_aug: # data augmentation options
    random_flip: True
    random_crop: True
    random_rotation: True
    color_enhance: False
    random_peper: False

train:
  exp_name: DeepPro_MIST_0214_train  # experiment name (as well as the root for saving results)
  batch_size: 12 # total batch size of all gpus, 12, 16
  num_workers: 16  # number of data loading workers
  total_epochs: 50  # number of total epochs to run, 48, 50
  log_interval: 50  # default 50 iters
  save_interval: 1  # default 1 epoch
  val_interval: 1  # default 1 epoch
  resume: